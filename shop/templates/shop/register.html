{% extends 'shop/base.html' %}
{% load static %}

{% block title %}Магаз.епта - Регистрация{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <h1 class="register-title">Добро пожаловать!</h1>

        <form id="registerForm" class="register-form" method="post">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group half">
                    <label for="id_first_name">Имя <span class="required-star">*</span></label>
                    <input type="text" id="id_first_name" name="first_name" required
                           pattern="[A-ZА-ЯЁ][a-zа-яё-]+" placeholder="Иван">
                    <span class="error-message"></span>
                </div>
                <div class="form-group half">
                    <label for="id_last_name">Фамилия</label>
                    <input type="text" id="id_last_name" name="last_name"
                           pattern="[A-ZА-ЯЁ][a-zа-яё-]+" placeholder="Петров">
                    <span class="error-message"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="id_username">Логин <span class="required-star">*</span></label>
                <input type="text" id="id_username" name="username" required
                       pattern="[A-Za-z0-9_]+" placeholder="ivan123">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="id_email">Email <span class="required-star">*</span></label>
                <input type="email" id="id_email" name="email" required
                       placeholder="ivan@example.com">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="id_phone">Телефон <span class="required-star">*</span></label>
                <input type="tel" id="id_phone" name="phone" required
                       placeholder="+7 (999) 999-99-99"
                       pattern="\+7\s?\(?[0-9]{3}\)?\s?[0-9]{3}-?[0-9]{2}-?[0-9]{2}">
                <span class="error-message"></span>
                <small class="input-hint">Формат: +7 (999) 999-99-99</small>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label for="id_password">Пароль <span class="required-star">*</span></label>
                    <input type="password" id="id_password" name="password" required minlength="8"
                           placeholder="Минимум 8 символов">
                    <span class="error-message"></span>
                </div>
                <div class="form-group half">
                    <label for="id_confirm_password">Подтвердите <span class="required-star">*</span></label>
                    <input type="password" id="id_confirm_password" name="confirm_password" required
                           placeholder="Введите ещё раз">
                    <span class="error-message"></span>
                </div>
            </div>

            <button type="submit" class="register-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'shop/js/register.js' %}"></script>
{% endblock %}
