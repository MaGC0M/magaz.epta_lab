{% extends 'shop/base.html' %}
{% load static %}

{% block title %}Магаз.епта - Вход{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1 class="login-title">Вход в аккаунт</h1>
        <p class="login-subtitle">Рады снова вас видеть!</p>

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Логин или Email <span class="required-star">*</span></label>
                <input type="text" id="id_username" name="username" required
                       placeholder="Введите логин или email">
            </div>

            <div class="form-group">
                <label for="id_password">Пароль <span class="required-star">*</span></label>
                <input type="password" id="id_password" name="password" required
                       placeholder="Введите пароль">
            </div>

            <button type="submit" class="login-btn">Войти</button>
        </form>

        <div class="login-link">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
        <div class="login-link">
            <a href="{% url 'home' %}">← Вернуться на главную</a>
        </div>
    </div>
</div>
{% endblock %}
